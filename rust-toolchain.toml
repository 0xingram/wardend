# Pin a concrete version (not "stable") for reproducible builds across sessions and CI.
# Bump deliberately; never float — a new toolchain can introduce clippy lints that break
# `clippy -D warnings` on unrelated PRs. See CLAUDE.md ("MSRV pinned, reproducible").
[toolchain]
channel = "1.96.0"
components = ["rustfmt", "clippy"]
